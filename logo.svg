<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>

    <!-- D letter gradient: lighter steel blue top-left → deeper blue bottom-right -->
    <linearGradient id="gD" x1="0%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#BDD0E8"/>
      <stop offset="30%"  stop-color="#8AAED4"/>
      <stop offset="65%"  stop-color="#5F8BBE"/>
      <stop offset="100%" stop-color="#3E6EA6"/>
    </linearGradient>

    <!-- D depth extrusion (darker version, offset) -->
    <linearGradient id="gDx" x1="0%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#5878A8"/>
      <stop offset="100%" stop-color="#2A4878"/>
    </linearGradient>

    <!-- Z letter gradient: medium navy top-left → deep navy bottom-right -->
    <linearGradient id="gZ" x1="0%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#4A6898"/>
      <stop offset="35%"  stop-color="#2E4A80"/>
      <stop offset="70%"  stop-color="#1C3468"/>
      <stop offset="100%" stop-color="#0E2050"/>
    </linearGradient>

    <!-- Z depth extrusion -->
    <linearGradient id="gZx" x1="0%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#162040"/>
      <stop offset="100%" stop-color="#080F28"/>
    </linearGradient>

    <!-- Highlight shimmer on D (top-left edge glow) -->
    <linearGradient id="gDh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="rgba(15,35,75,0.28)"/>
    </filter>

    <!-- Clip so Z doesn't bleed outside DZ mark area -->
    <clipPath id="clip">
      <rect x="95" y="55" width="310" height="280"/>
    </clipPath>

  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!--  3-D EXTRUSION LAYER (behind, offset +4/+5) -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- D extrusion shadow -->
  <path fill-rule="evenodd" fill="url(#gDx)" opacity="0.55"
    d="M 104,65 L 194,65
       Q 295,65 295,197 Q 295,329 194,329
       L 104,329 Z
       M 159,115 L 186,115
       Q 240,115 240,197 Q 240,279 186,279
       L 159,279 Z"/>

  <!-- Z extrusion shadow -->
  <path fill="url(#gZx)" opacity="0.45"
    d="M 213,65 L 400,65 L 400,117
       L 252,279 L 400,279 L 400,331
       L 213,331 L 213,279 L 358,117
       L 213,117 Z"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  MAIN LETTER FACES                     -->
  <!-- ═══════════════════════════════════════ -->

  <!-- D letter (fill-rule evenodd creates the D hollow) -->
  <path fill-rule="evenodd" fill="url(#gD)" filter="url(#shadow)"
    d="M 100,60 L 192,60
       Q 292,60 292,193 Q 292,326 192,326
       L 100,326 Z
       M 156,110 L 184,110
       Q 237,110 237,193 Q 237,276 184,276
       L 156,276 Z"/>

  <!-- D highlight shimmer overlay -->
  <path fill-rule="evenodd" fill="url(#gDh)"
    d="M 100,60 L 192,60
       Q 292,60 292,193 Q 292,326 192,326
       L 100,326 Z
       M 156,110 L 184,110
       Q 237,110 237,193 Q 237,276 184,276
       L 156,276 Z"/>

  <!-- Z letter (solid, sits on top of D) -->
  <path fill="url(#gZ)" filter="url(#shadow)"
    d="M 208,60 L 396,60 L 396,112
       L 248,274 L 396,274 L 396,326
       L 208,326 L 208,274 L 354,112
       L 208,112 Z"/>

  <!-- ═══════════════════════════════════════ -->
  <!--  TEXT  DUKAANZONE                      -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Subtle text shadow -->
  <text x="252" y="424" text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
    font-size="49" font-weight="900" letter-spacing="3.5"
    fill="rgba(10,25,60,0.18)">DUKAANZONE</text>

  <!-- Actual coloured text: DUKAAN (lighter) + ZONE (darker) -->
  <text x="250" y="420" text-anchor="middle"
    font-family="'Arial Black', 'Arial Bold', Arial, Helvetica, sans-serif"
    font-size="49" font-weight="900" letter-spacing="3.5">
    <tspan fill="#6A8EBC">DUKAAN</tspan><tspan fill="#0E2050">ZONE</tspan>
  </text>

</svg>
