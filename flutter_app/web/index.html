<!DOCTYPE html>

<head>

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">

  <meta name="mobile-web-app-capable" content="yes">

  <title>DukaanZone</title>

  <!-- Agora Web SDK — required for agora_rtc_engine on Flutter Web -->
  <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>

  <!-- Ringtone synth for incoming calls -->
  <script>
    window._ringtoneCtx = null;
    window._ringtoneInterval = null;

    window.startRingtone = function() {
      try {
        window.stopRingtone();
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        var ctx = new AC();
        window._ringtoneCtx = ctx;

        function ring() {
          function beep(freq, start, dur) {
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.0, ctx.currentTime + start);
            gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + start + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(ctx.currentTime + start);
            osc.stop(ctx.currentTime + start + dur);
          }
          // Classic phone ring: two short beeps then pause
          beep(480, 0.0, 0.40);
          beep(480, 0.5, 0.40);
        }

        ring();
        window._ringtoneInterval = setInterval(ring, 2000);
      } catch(e) { console.warn('Ringtone error', e); }
    };

    window.stopRingtone = function() {
      try {
        clearInterval(window._ringtoneInterval);
        window._ringtoneInterval = null;
        if (window._ringtoneCtx) {
          window._ringtoneCtx.close().catch(function(){});
          window._ringtoneCtx = null;
        }
      } catch(e) {}
    };
  </script>
</head>
<body>

</body>
</html>
